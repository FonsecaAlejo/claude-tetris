<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="theme-toggle">
      <span class="theme-icon">🌙</span>
      <label class="switch" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle-input" />
        <span class="slider"></span>
      </label>
      <span class="theme-icon">☀️</span>
    </div>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section" id="highscores-section">
          <span class="label">RECORDS</span>
          <ol id="highscores-list" class="highscores-list"></ol>
          <div class="highscore-stats">
            <span>Mejor combo: <b id="best-combo">0</b></span>
            <span>Máx. líneas: <b id="best-lines">0</b></span>
          </div>
          <button id="reset-scores-btn" class="reset-scores-btn">Resetear records</button>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-newscore" class="hidden">
          <p class="newscore-label">¡Nuevo récord! Ingresá tu nombre:</p>
          <input type="text" id="name-input" maxlength="12" placeholder="Jugador" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
